version: '3.8'

services:
  foxgirlsorg-manga:
    container_name: foxgirlsorg-manga
    build: .
    image: foxgirlsorg-manga:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: foxgirlsorg-mangaDB
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./yarn.lock:/opt/yarn.lock
      - ./.env:/opt/app/.env
      - ./public/uploads:/opt/app/public/uploads
    ports:
      - '1337:1337'
    networks:
      - foxgirlsorg-manga
    depends_on:
      - foxgirlsorg-mangaDB

  foxgirlsorg-mangaDB:
    container_name: foxgirlsorg-mangaDB
    platform: linux/amd64
    image: mariadb:latest
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - foxgirlsorg-manga-data:/var/lib/mysql
      - ./data:/var/lib/postgresql/data/
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - '3306:3306'
    networks:
      - foxgirlsorg-manga

volumes:
  foxgirlsorg-manga-data:

networks:
  foxgirlsorg-manga:
    name: Foxgirlsorg-manga
    driver: bridge
